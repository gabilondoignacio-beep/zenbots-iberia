[build]
builder = "nixpacks"

[deploy]
startCommand = "sh -c \"cd website && gunicorn app:app --bind 0.0.0.0:${PORT:-8080} --workers 2 --timeout 120\""
healthcheckPath = "/api/products"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[environments.production.variables]
PORT = "8080"
ADMIN_TOKEN = "ZenbotsAdmin2024!"
